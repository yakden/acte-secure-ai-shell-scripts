name: CI

# Runs the full test suite and a smoke run of the experiment harness on every
# push and pull request, so the reproducibility claims stay honest over time.

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Install ShellCheck (baseline tool)
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run test suite
        run: python -m pytest tests/ -q

  reproduce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Reproduce the full study (regenerates data, runs all RQs)
        run: python -m experiments.run_all

      - name: Upload results and figures
        uses: actions/upload-artifact@v4
        with:
          name: acte-results
          path: |
            experiments/results/results.json
            experiments/results/results.md
            experiments/figures/*.png
